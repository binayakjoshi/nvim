unbind C-b
set -g prefix C-a
bind C-a send-prefix

# MOUSE SUPPORT
set -g mouse on

# SPLIT WINDOW SHORTCUTS
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %
# PANE RESIZING
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

bind r source-file ~/.tmux.conf \; display "Reloaded!"

# TRUE COLOR SUPPORT

set -g default-terminal "tmux-256color"

set -as terminal-features ',*:RGB'
set -as terminal-features ',*:usstyle'
# PLUGIN MANAGEMENT (TPM)
set -g @plugin 'tmux-plugins/tpm'                  # TPM itself
set -g @plugin 'tmux-plugins/tmux-sensible'       # sane defaults
set -g @plugin 'christoomey/vim-tmux-navigator'   # seamless nvim ↔ tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'      # manual save/restore

# SESSION PERSISTENCE – MANUAL SAVE / RESTORE
# Keybindings for manual save/restore
set -g @resurrect-save 'C-s'        
set -g @resurrect-restore 'C-r'  

set -g @resurrect-strategy-nvim 'session'

# EVERFOREST-STYLE THEME
# Status bar
set -g status-style "bg=#2b3339,fg=#d3c6aa"

# Inactive windows
set -g window-status-style "bg=#2b3339,fg=#7a8478"

# Active window
set -g window-status-current-style "bg=#3a464c,fg=#e67e80"

# Status left / right
set -g status-left "#[fg=#a7c080,bold] #S "
set -g status-right "#[fg=#83c092] %H:%M "

# Window formatting
set -g window-status-format " #I:#W "
set -g window-status-current-format " #[bold]#I:#W "
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection
bind-key -T copy-mode-vi Y send -X copy-line
# Pane borders
set -g pane-border-style "fg=#4f5b58"
set -g pane-active-border-style "fg=#a7c080"

# Messages
set -g message-style "bg=#2b3339,fg=#a7c080"
# TPM INITIALIZATION (KEEP LAST)
run '~/.tmux/plugins/tpm/tpm'

unbind -n C-l
